name: flutter_task
description: A production-ready Flutter shopping app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Fonts
  google_fonts: ^8.1.0
  # Navigation
  go_router: ^13.2.0
  # Network
  dio: ^5.4.1
  cached_network_image: ^3.3.1
  # Utils
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
